<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Chord Piano Tool</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 왼쪽 코드 패널 -->
<div id="left"></div>

<!-- 중앙 -->
<div id="center">
  <canvas id="wave"></canvas>
  <div id="piano"></div>
</div>

<!-- 오른쪽 -->
<div id="right">
  <div id="controls">
    <button id="playBtn">Play</button>
    <button id="loopBtn">Loop</button>
    <button id="clearBtn">Clear</button>
  </div>
  <div id="effects"></div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
