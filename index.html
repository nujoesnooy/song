<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Web Synth + Chords</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- 왼쪽 코드 버튼 -->
  <div class="sidebar-left">
    <h3>Chords</h3>
    <div class="chords"></div>
  </div>

  <!-- 중앙 파형 -->
  <div class="center">
    <canvas id="waveform" width="800" height="300"></canvas>
  </div>

  <!-- 오른쪽 위 코드 저장/재생 -->
  <div class="sidebar-right-top">
    <h3>Sequence</h3>
    <div id="sequence"></div>
    <button id="playSeq">Play Sequence</button>
    <button id="clearSeq">Clear</button>
  </div>

  <!-- 오른쪽 아래 신디사이저 키보드 -->
  <div class="sidebar-right-bottom">
    <h3>Synth Keyboard</h3>
    <div class="keyboard"></div>
    <p>Keys: A S D F G H J K L ;</p>
  </div>

</div>

<script src="piano.js"></script>
</body>
</html>
