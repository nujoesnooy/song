<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Web Chord Player</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- 왼쪽 코드 -->
  <div class="sidebar-left">
    <h3>Chords</h3>
    <div class="chords"></div>
  </div>

  <!-- 중앙 파형 -->
  <div class="center">
    <canvas id="waveform" width="800" height="250"></canvas>
  </div>

  <!-- 오른쪽 상단 저장/재생 -->
  <div class="sidebar-right-top">
    <h3>Sequence</h3>
    <div id="sequence"></div>
    <button id="playSeq">Play</button>
    <button id="loopSeq">Loop</button>
    <button id="clearSeq">Clear</button>
  </div>

  <!-- 오른쪽 하단 이펙터 -->
  <div class="sidebar-right-bottom">
    <h3>Effects</h3>
    <label>Echo <input type="range" id="echoGain" min="0" max="1" step="0.05" value="0.4"></label>
    <label>Delay <input type="range" id="delayTime" min="0" max="1" step="0.05" value="0.25"></label>
    <label>Reverb <input type="range" id="reverbGain" min="0" max="1" step="0.05" value="0.3"></label>
    <label>Chorus <input type="range" id="chorusGain" min="0" max="1" step="0.05" value="0.3"></label>
  </div>

</div>

<footer>
  Made by nujoesnooy | Version 0.01
</footer>

<script src="piano.js"></script>
</body>
</html>
