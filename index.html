<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Chord Piano</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- 왼쪽: 코드 패널 -->
  <div class="sidebar-left">
    <h3>Chords</h3>
    <!-- C ~ B 그룹, 버튼은 JS로도 생성 가능 -->
    <div id="chordButtons"></div>
  </div>

  <!-- 중앙: 파형 + 피아노 -->
  <div class="center">
    <div class="center-top">
      <canvas id="waveform" width="800" height="250"></canvas>
    </div>
    <div class="center-bottom">
      <div id="pianoKeys"></div>
      <div class="oct-controls">
        <button id="octDown">OCT -</button>
        <button id="octUp">OCT +</button>
      </div>
    </div>
  </div>

  <!-- 오른쪽: 시퀀스 + 효과 -->
  <div class="sidebar-right">
    <div class="right-top">
      <h3>Sequence</h3>
      <div id="sequence"></div>
      <button id="playSeq">Play</button>
      <button id="loopSeq">Loop</button>
      <button id="clearSeq">Clear</button>
    </div>
    <div class="right-bottom">
      <h3>Effects</h3>
      <div id="effectSliders"></div>
    </div>
  </div>

</div>

<footer>Made by nujoesnooy | Version 0.01</footer>

<script src="utils.js"></script>
<script src="audio.js"></script>
<script src="piano.js"></script>
</body>
</html>
