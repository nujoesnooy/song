<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>Web Chord Synth</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- 왼쪽 코드 영역 -->

<div class="leftPanel" id="chordPanel">
<h3>Chords</h3>
</div>

<!-- 중앙 -->

<div class="centerPanel">

<div class="visualArea">
<canvas id="waveform"></canvas>
</div>

<div class="pianoArea">

<div id="pianoKeys"></div>

<div class="octaveControls">
<button id="octDown">OCT -</button>
<button id="octUp">OCT +</button>
</div>

</div>

</div>

<!-- 오른쪽 -->

<div class="rightPanel">

<div class="sequencerArea">

<h3>Sequence</h3>

<div id="sequence"></div>

<button id="playSeq">Play</button> <button id="loopSeq">Loop</button> <button id="clearSeq">Clear</button>

</div>

<div class="effectsArea" id="effectsPanel">

<h3>Effects</h3>

</div>

</div>

</div>

<footer>
Made by nujoesnooy | Version 0.01
</footer>

<script src="audio.js"></script>

<script src="effects.js"></script>

<script src="sequencer.js"></script>

<script src="piano.js"></script>

<script src="visualizer.js"></script>

</body>
</html>
