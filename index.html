<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Web Music Studio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LEFT : CHORDS -->
<div id="left"></div>

<!-- CENTER -->
<div id="center">

<canvas id="wave"></canvas>

<div id="piano"></div>

</div>

<!-- RIGHT -->
<div id="right">

<div id="recorder">

<button id="record">REC</button>
<button id="play">PLAY</button>
<button id="loop">LOOP</button>
<button id="clear">CLEAR</button>

</div>

<div id="synth">

<div class="knob">Filter<input type="range" id="filter" min="100" max="10000"></div>
<div class="knob">Resonance<input type="range" id="res" min="0" max="20"></div>
<div class="knob">Reverb<input type="range" id="reverb" min="0" max="1" step="0.01"></div>
<div class="knob">Chorus<input type="range" id="chorus" min="0" max="1" step="0.01"></div>
<div class="knob">Attack<input type="range" id="attack" min="0" max="2" step="0.01"></div>
<div class="knob">Release<input type="range" id="release" min="0" max="3" step="0.01"></div>
<div class="knob">EQ Low<input type="range" id="eqlow" min="-20" max="20"></div>
<div class="knob">EQ High<input type="range" id="eqhigh" min="-20" max="20"></div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
