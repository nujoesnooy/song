<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Web Synth + Chords + Effects</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- 왼쪽 코드 버튼 -->
  <div class="sidebar-left">
    <h3>Chords</h3>
    <div class="chords"></div>
  </div>

  <!-- 중앙 파형 -->
  <div class="center">
    <canvas id="waveform" width="800" height="300"></canvas>
  </div>

  <!-- 오른쪽 상단 시퀀스 -->
  <div class="sidebar-right-top">
    <h3>Sequence</h3>
    <div id="sequence"></div>
    <button id="playSeq">Play Sequence</button>
    <button id="clearSeq">Clear</button>
  </div>

  <!-- 오른쪽 하단 이펙터 -->
  <div class="sidebar-right-bottom">
    <h3>Effects</h3>
    <div class="effect">
      <label>Echo: <input type="range" id="echoGain" min="0" max="1" step="0.05" value="0.4"></label>
    </div>
    <div class="effect">
      <label>Delay: <input type="range" id="delayTime" min="0" max="1" step="0.05" value="0.25"></label>
    </div>
    <div class="effect">
      <label>Reverb: <input type="range" id="reverbGain" min="0" max="1" step="0.05" value="0.3"></label>
    </div>
    <div class="effect">
      <label>Chorus: <input type="range" id="chorusGain" min="0" max="1" step="0.05" value="0.3"></label>
    </div>
  </div>

</div>

<script src="piano.js"></script>
</body>
</html>
