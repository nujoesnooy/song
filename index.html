<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Web Music Studio</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
height:100vh;
display:grid;
grid-template-columns:1fr 3fr 1fr;
}

/* LEFT */

#left{
display:grid;
grid-template-rows:repeat(7,1fr);
border-right:2px solid #333;
}

.chordRow{
border-bottom:1px solid #333;
padding:5px;
}

.chordTitle{
text-align:center;
font-weight:bold;
margin-bottom:4px;
}

.chordButtons{
display:flex;
flex-wrap:wrap;
}

.chordButtons button{
flex:1 1 30%;
margin:2px;
background:#222;
border:none;
color:white;
padding:6px;
cursor:pointer;
border-radius:4px;
transition:0.1s;
}

.chordButtons button:active{
background:orange;
transform:scale(0.95);
}

/* CENTER */

#center{
display:grid;
grid-template-rows:5fr 2fr;
border-right:2px solid #333;
}

#wave{
background:black;
width:100%;
height:100%;
}

#piano{
display:flex;
height:100%;
}

.key{
flex:1;
background:white;
border:1px solid black;
cursor:pointer;
}

.key:active{
background:orange;
}

/* RIGHT */

#right{
display:grid;
grid-template-rows:1fr 1fr;
}

/* recorder */

#recorder{
display:flex;
gap:5px;
padding:10px;
}

#recorder button{
flex:1;
background:#222;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:4px;
}

#recorder button:active{
background:orange;
}

/* synth */

#synth{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.knob{
display:flex;
flex-direction:column;
align-items:center;
}

.knob input{
transform:rotate(-90deg);
width:90px;
}

</style>
</head>


<body>

<div id="left"></div>

<div id="center">

<canvas id="wave"></canvas>

<div id="piano"></div>

</div>


<div id="right">

<div id="recorder">

<button id="record">REC</button>
<button id="play">PLAY</button>
<button id="loop">LOOP</button>
<button id="clear">CLEAR</button>

</div>

<div id="synth">

<div class="knob">Filter<input id="filter" type="range" min="100" max="8000"></div>
<div class="knob">Resonance<input id="res" type="range" min="0" max="20"></div>
<div class="knob">Reverb<input id="reverb" type="range" min="0" max="1" step="0.01"></div>
<div class="knob">Chorus<input id="chorus" type="range" min="0" max="1" step="0.01"></div>
<div class="knob">Attack<input id="attack" type="range" min="0" max="2" step="0.01"></div>
<div class="knob">Release<input id="release" type="range" min="0" max="3" step="0.01"></div>
<div class="knob">EQ Low<input id="low" type="range" min="-20" max="20"></div>
<div class="knob">EQ High<input id="high" type="range" min="-20" max="20"></div>

</div>

</div>



<script>

const ctx=new AudioContext()

const analyser=ctx.createAnalyser()
analyser.connect(ctx.destination)

const filter=ctx.createBiquadFilter()
filter.connect(analyser)

let attack=0.01
let release=1

/* SYNTH */

filter.type="lowpass"

filter.frequency.value=1000

document.getElementById("filter").oninput=e=>{
filter.frequency.value=e.target.value
}

document.getElementById("attack").oninput=e=>{
attack=e.target.value
}

document.getElementById("release").oninput=e=>{
release=e.target.value
}

/* PIANO */

const notes=[261,293,329,349,392,440,493,523,587,659,698,784]

const piano=document.getElementById("piano")

notes.forEach(freq=>{

let key=document.createElement("div")

key.className="key"

key.onclick=()=>play(freq)

piano.appendChild(key)

})

function play(freq){

let osc=ctx.createOscillator()

let gain=ctx.createGain()

osc.type="sawtooth"

osc.frequency.value=freq

osc.connect(filter)

filter.connect(gain)

gain.connect(analyser)

let now=ctx.currentTime

gain.gain.setValueAtTime(0,now)

gain.gain.linearRampToValueAtTime(1,now+attack)

gain.gain.linearRampToValueAtTime(0,now+release)

osc.start()

osc.stop(now+release)

}

/* CHORDS */

const roots=["C","D","E","F","G","A","B"]

const types=["","m","m7","M","7","sus4"]

const left=document.getElementById("left")

roots.forEach(root=>{

let row=document.createElement("div")

row.className="chordRow"

let title=document.createElement("div")

title.className="chordTitle"

title.innerText=root

row.appendChild(title)

let buttons=document.createElement("div")

buttons.className="chordButtons"

types.forEach(type=>{

let b=document.createElement("button")

b.innerText=root+type

b.onclick=()=>playChord(root)

buttons.appendChild(b)

})

row.appendChild(buttons)

left.appendChild(row)

})

function playChord(root){

const map={
C:[261,329,392],
D:[293,369,440],
E:[329,415,493],
F:[349,440,523],
G:[392,493,587],
A:[440,554,659],
B:[493,622,739]
}

map[root].forEach(n=>play(n))

}

/* VISUALIZER */

const canvas=document.getElementById("wave")

const c=canvas.getContext("2d")

canvas.width=900

canvas.height=300

function draw(){

requestAnimationFrame(draw)

let data=new Uint8Array(analyser.frequencyBinCount)

analyser.getByteTimeDomainData(data)

c.fillStyle="black"

c.fillRect(0,0,canvas.width,canvas.height)

c.strokeStyle="lime"

c.beginPath()

for(let i=0;i<data.length;i++){

let x=i/data.length*canvas.width

let y=data[i]/255*canvas.height

if(i===0)c.moveTo(x,y)

else c.lineTo(x,y)

}

c.stroke()

}

draw()

</script>

</body>
</html>
